<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Agrupando colunas de Tabelas</title>
    <style>
        body {
            font-family: Arial, Helvetica, sans-serif;
        }

        table {
            border-collapse: collapse;
            width: 400px;
            text-align: center;
        }

        caption{
            font-size: 1.2em;
        }

        th, td {
            border: 1px solid black;
        }

        #col1 {
            background-color: lightblue;
        }

        #col2 {
            background-color: lightcoral;
        }

        #col3 {
            background-color: lightgreen;
        }

        #col4 {
            background-color: lightgrey;
        }

    </style>
</head>
<body>
    <h1>Agrupando colunas de Tabelas</h1>

    <table>
        <colgroup>
            <col id="col1">
            <col id="col2">
            <col id="col3">
            <col id="col4">
        </colgroup>

        <caption>Cadastro</caption>

        <tr>
            <th scope="col">Nome</th>
            <th scope="col">Sexo</th>
            <th scope="col">Idade</th>
            <th scope="col">Profissão</th>
        </tr>

        <tr>
            <td>Ana</td>
            <td>F</td>
            <td>25</td>
            <td>Jornalista</td>
        </tr>

        <tr>
            <td>Cláudio</td>
            <td>M</td>
            <td>30</td>
            <td>Programador</td>
        </tr>

        <tr>
            <td>Gustavo</td>
            <td>M</td>
            <td>27</td>
            <td>Professor</td>
        </tr>

        <tr>
            <td>Maria</td>
            <td>M</td>
            <td>40</td>
            <td>Vendedora</td>
        </tr>
    </table>
</body>
</html>
