<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Flex Box 5 - Centralização</title>
    <style>
        * {
            margin: 0px;
            padding: 0px;
            box-sizing: border-box;
        }

        body {
            background-color: lightsalmon;
        }

        main {
            background-color: lightgreen;
            height: 100vh;
            width: 100vw;

            display: flex;
            justify-content: center;
            align-items: center;
        }

        section {
            background-color: lightblue;
            height: 200px;
            width: 200px;

            display: flex;
            justify-content: center;
            align-items: center;

            text-align: center;
        }
    </style>
</head>
<body>
    <main>
        <section>
            <h1>Centralização Absoluta</h1>
        </section>
    </main>
</body>
</html>
