<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Flex-box 9</title>

    <style>
        div.container {
            background-color: aquamarine;
            
            display: flex;
            flex-flow: row wrap;
        }

        div.item {
            background-color: lightcoral;
            border: 1px solid black;
            text-align: center;
            flex-basis: 250px;
        }
    </style>

</head>
<body>
    <div class="container">
        <div class="item">A</div>
        <div class="item">B conteúd maior</div>
        <div class="item">C</div>
        <div class="item">D conteúdo maior ainda</div>
        <div class="item">E</div>
        <div class="item">F conteúdo muito muito muito muito muito maior</div>
        <div class="item">G</div>
    </div>
</body>
</html>
