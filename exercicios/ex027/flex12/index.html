<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Flex-box 12</title>

    <style>
        div.container {
            background-color: aquamarine;
            
            display: flex;
            flex-flow: row nowrap;
        }

        div.item {
            background-color: lightcoral;
            border: 1px solid black;
            text-align: center;
        }

        div#cxa {
            /* flex-shrink: 0;
            flex-grow: 1;
            flex-basis: 300px; */
            
            /* o FLEX é o shorthand, a ordem é sempre grow, shrink e basis */
            flex: 1 0 300px;
        }

        div#cxb {
            /* flex-shrink: 1;
            flex-grow: 0;
            flex-basis: 250px; */
            flex: 0 1 250px;
        }

        div#cxc {
            /* flex-shrink: 4;
            flex-grow: 3;
            flex-basis: 200px;*/
            flex: 3 4 200px;
        }

    </style>

</head>
<body>
    <div class="container">
        <div class="item" id="cxa">A</div>
        <div class="item" id="cxb">B</div>
        <div class="item" id="cxc">C</div>
    </div>
</body>
</html>
