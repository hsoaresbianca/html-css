<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Aula iframe</title>
    <style>
        iframe {
            width: 400px;
            height: 400px;
            border: 1px solid black;
        }
    </style>
</head>
<body>
    <h1>Testando o uso de um iframe</h1>

    <p>Acessando o site do <iframe src="https://www.cursoemvideo.com/" frameborder="0"></iframe> para aprender a programar.</p>

    <p>O site do
        <iframe src="https://www.google.com.br/" frameborder="0">
            <a href="https://www.google.com.br/" target="_blank">Google</a>
        </iframe>
        não funciona dentro do iframe.
    </p>

    <p></p>
</body>
</html>
